<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Off the trail — FernTrail Technologies</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0D1711" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,400&family=Spline+Sans+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#0D1711;--ink:#E9E7D9;--ink-soft:#AEB8AC;--muted:#76837A;--fern:#5FA877;--fern-bright:#88CEA1;--line:rgba(233,231,217,.12);--serif:'Spectral',Georgia,serif;--mono:'Spline Sans Mono',ui-monospace,monospace;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--ink);font-family:var(--serif);font-weight:300;-webkit-font-smoothing:antialiased;text-align:center;padding:40px;position:relative;overflow:hidden;}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(120% 80% at 78% -10%,rgba(95,168,119,.16),transparent 55%),radial-gradient(140% 120% at 50% 120%,rgba(5,11,8,.85),transparent 60%);}
  .box{position:relative;z-index:2;max-width:46ch;}
  .mark{width:62px;height:62px;color:var(--fern-bright);margin:0 auto 30px;display:block;filter:drop-shadow(0 0 30px rgba(95,168,119,.35));}
  .code{font-family:var(--mono);font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
  h1{font-weight:300;font-size:clamp(2.2rem,6vw,3.4rem);letter-spacing:-.02em;line-height:1.08;}
  h1 em{font-style:italic;color:var(--fern-bright);}
  p{margin:22px auto 0;color:var(--ink-soft);font-size:1.15rem;line-height:1.5;}
  a.home{display:inline-flex;align-items:center;gap:.5em;margin-top:34px;font-family:var(--mono);font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;background:var(--fern);color:#0A130D;padding:.8em 1.4em;border-radius:999px;text-decoration:none;transition:background .22s,transform .22s;}
  a.home:hover{background:var(--fern-bright);transform:translateY(-1px);}
</style>
</head>
<body>
  <div class="box">
    <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
      <path d="M82 50 A32 32 0 0 1 18 50 A28 28 0 0 1 74 50 A24 24 0 0 1 26 50 A20 20 0 0 1 66 50 A16 16 0 0 1 34 50 A12 12 0 0 1 58 50 A8 8 0 0 1 42 50" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <div class="code">Error 404</div>
    <h1>This path leads <em>off the trail.</em></h1>
    <p>The page you're looking for isn't here. Let's get you back to solid ground.</p>
    <a class="home" href="/">← Back to FernTrail</a>
  </div>
</body>
</html>
